# Connexion MySQL XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/uchk_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.version=8

# Port du serveur
server.port=8080

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Dossier de stockage des fichiers
fichiers.upload-dir=C:/xampp/htdocs/documents-unchk/
fichiers.base-url=http://localhost/documents-unchk/